<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="line" x1="5" y1="37" x2="43" y2="8">
      <stop offset="0%" stop-color="#4c1d95" stop-opacity="0.6"/>
      <stop offset="55%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#e879f9"/>
    </linearGradient>
    <linearGradient id="area" x1="0" y1="0" x2="0" y2="48">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
    <filter id="dot">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <clipPath id="clip">
      <rect width="48" height="48" rx="11"/>
    </clipPath>
  </defs>

  <!-- 배경 -->
  <rect width="48" height="48" rx="11" fill="#070412"/>

  <!-- 에어리어 채우기 -->
  <path d="M5 37 L8 37 L11 31 L13 40 L17 22 L19 32 L23 28 L26 19 L28 26 L31 31 L33 25 L37 11 L40 13 L43 8 L43 48 L5 48 Z"
        fill="url(#area)" clip-path="url(#clip)"/>

  <!-- 글로우 레이어 -->
  <path d="M5 37 L8 37 L11 31 L13 40 L17 22 L19 32 L23 28 L26 19 L28 26 L31 31 L33 25 L37 11 L40 13 L43 8"
        stroke="url(#line)" stroke-width="4" fill="none"
        stroke-linecap="round" stroke-linejoin="round"
        filter="url(#glow)" opacity="0.55"/>

  <!-- 메인 차트선 -->
  <path d="M5 37 L8 37 L11 31 L13 40 L17 22 L19 32 L23 28 L26 19 L28 26 L31 31 L33 25 L37 11 L40 13 L43 8"
        stroke="url(#line)" stroke-width="2" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 조정 저점 점 (31, 31) -->
  <circle cx="31" cy="31" r="5.5" fill="#e879f9" filter="url(#dot)" opacity="0.45"/>
  <circle cx="31" cy="31" r="3.5" fill="#1a0040" stroke="#e879f9" stroke-width="1.5"/>
  <circle cx="31" cy="31" r="1.5" fill="#fde68a"/>
</svg>
